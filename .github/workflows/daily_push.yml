name: Daily A股复盘推送

on:
  schedule:
    # UTC 09:00 = 北京时间 17:00（周一到周五）
    - cron: '0 9 * * 1-5'
  workflow_dispatch:   # 允许手动点击运行

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许脚本push图片回仓库
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas matplotlib openpyxl python-docx requests

      - name: Run daily report
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}  # 可选
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Commit and push charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "daily: add charts $(date +%Y-%m-%d)" || echo "No changes"
          git push
